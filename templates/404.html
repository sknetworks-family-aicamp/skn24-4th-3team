{% extends "base.html" %}
{% load static %}

{% block title %}HelpMet - 404 ERROR{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/404.css' %}">
{% endblock %}

{% block content %}
<div class="container">
    <div class="header error-header-fix">
        <span class="title">HelpMet</span>
    </div>

    <main class="content error-content-fix">
        <img src="{% static 'images/helpmet.png' %}" alt="HelpMet" class="error-img">

        <h1 class="error-code">404 ERROR</h1>

        <div class="error-text-group">
            <p class="error-main-text">죄송합니다. 페이지를 찾을 수 없습니다.</p>
            <p class="error-sub-text">
                존재하지 않는 주소를 입력했거나<br>
                요청하신 페이지의 주소가 변경 또는 삭제되었습니다.
            </p>
        </div>

        <a class="error-btn" href="{% url 'dashboard' %}">홈으로</a>
    </main>
</div>
{% endblock %}
