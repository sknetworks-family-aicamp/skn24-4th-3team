{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBM 현장관리 - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- 로고/제목 영역 -->
            <div class="logo-section">
                <h1>스마트한 TBM 현장관리</h1>
                <p>안전한 하루의 시작, HelpMet과 함께</p>
            </div>

            <!-- 로그인 폼 -->
            <div class="form-section">
                <div class="input-group">
                    <div class="input-wrapper single">
                        <span class="input-icon">✉</span>
                        <input type="email" id="login-email" placeholder="아이디 (이메일)">
                    </div>
                    <div class="error-message" id="email-error"></div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper single">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="login-password" placeholder="비밀번호">
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>

                <div class="forgot-password">
                    <a href="/account/password/find/">비밀번호 찾기</a>
                </div>

                <button class="btn btn-primary" onclick="handleLogin()">로그인</button>

                <div class="divider">or</div>

                <button class="btn btn-secondary" onclick="location.href='/account/register/terms/'">회원가입</button>
            </div>
        </div>
    </div>

    <!-- 잠금 경고 팝업 (에러 시 표시) -->
    <div class="popup-overlay" id="error-popup">
        <div class="popup">
            <h3>잠금 경고</h3>
            <p>비밀번호를 5회 잘못 입력하였습니다.<br>10분 후 다시 시도해 주세요.</p>
            <button class="btn btn-primary" onclick="closePopup('error-popup')">확인</button>
        </div>
    </div>

    <script src="{% static 'js/common.js' %}"></script>
    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
