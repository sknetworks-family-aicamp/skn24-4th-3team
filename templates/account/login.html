{% extends "base.html" %}
{% load static %}

{% block title %}TBM 현장관리 - 로그인{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
    <div class="container">
        <div class="content">
            <div class="logo-section">
                <h1>스마트한 TBM 현장관리</h1>
                <p>안전한 하루의 시작, HelpMet과 함께</p>
            </div>

            <div class="form-section">
                <div class="input-group">
                    <div class="input-wrapper single">
                        <span class="input-icon">✉</span>
                        <input type="email" id="login-email" placeholder="아이디 (이메일)">
                    </div>
                    <div class="error-message" id="email-error"></div>
                </div>

                <div class="input-group">
                    <div class="input-wrapper single">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="login-password" placeholder="비밀번호">
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>

                <div class="forgot-password">
                    <a href="/account/password/find/">비밀번호 찾기</a>
                </div>

                <button class="btn btn-primary" onclick="handleLogin()">로그인</button>

                <div class="divider">or</div>

                <button class="btn btn-secondary" onclick="location.href='/account/register/terms/'">회원가입</button>
            </div>
        </div>
    </div>

{% endblock %}

{% block extra_script %}
    <script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
