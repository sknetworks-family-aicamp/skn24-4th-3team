{% extends "base.html" %}
{% load static %}

{% block title %}TBM 현장관리 - 회원가입{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
    <div class="container">
        {% include "common/header.html" with title="안전한 하루의 시작, HelpMet과 함께" only %}

        <div class="content">
            <div class="form-section">
                <h2 class="form-title">계정 정보</h2>

                <div class="input-group">
                    <label>아이디(이메일)<span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="email" id="register-email" placeholder="ex) example@helpmet.net">
                        <button class="btn btn-primary btn-small" id="check-email-btn" onclick="checkEmailDuplicate()" disabled>인증번호 발송</button>
                    </div>
                    <div class="error-message" id="register-email-error"></div>
                    <div class="success-message" id="register-email-success"></div>
                </div>

                <div class="input-group">
                    <label>인증번호<span class="required">*</span></label>
                    <div class="input-wrapper">
                        <input type="text" id="register-verification-code" placeholder="인증번호를 입력해주세요.">
                        <button class="btn btn-primary btn-small" id="verify-register-code-btn" onclick="verifyRegisterCode()" disabled>확인</button>
                    </div>
                    <div class="error-message" id="register-code-error"></div>
                    <div class="success-message" id="register-code-success"></div>
                    <div class="timer" id="register-verification-timer" style="display: none;">05:00</div>
                </div>

                <div class="input-group">
                    <label>비밀번호<span class="required">*</span></label>
                    <div class="input-wrapper single">
                        <input type="password" id="register-password" placeholder="영문 대소문자, 숫자, 특수문자를 각각 최소 1개 이상 포함하여 8~16자 이상 만들어주세요.">
                    </div>
                    <div class="error-message" id="register-password-error"></div>
                </div>

                <div class="input-group">
                    <label>비밀번호 확인<span class="required">*</span></label>
                    <div class="input-wrapper single">
                        <input type="password" id="register-password-confirm" placeholder="************">
                    </div>
                    <div class="error-message" id="register-password-confirm-error"></div>
                    <div class="success-message" id="register-password-confirm-success"></div>
                </div>

                <div style="text-align: right; margin-top: 40px;">
                    <button class="btn btn-primary" id="register-next-btn" onclick="completeRegistration()" style="width: auto; min-width: 120px;" disabled>다음</button>
                </div>
            </div>
        </div>
    </div>

{% endblock %}

{% block extra_script %}
    <script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
