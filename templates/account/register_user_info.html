{% extends "base.html" %}
{% load static %}

{% block title %}TBM 현장관리 - 회원가입{% endblock %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
    <div class="container">
        {% include "common/header.html" with title="안전한 하루의 시작, HelpMet과 함께" only %}

        <div class="content">
            <div class="form-section">
                <h2 class="form-title">사용자 정보</h2>

                <div class="input-group">
                    <label>이름<span class="required">*</span> <span style="font-size: 13px; color: #999;">ex) 염준식</span></label>
                    <div class="input-wrapper single">
                        <input type="text" id="user-name" placeholder="최대 20자" maxlength="20" oninput="validateTextField('user-name', 20)">
                    </div>
                    <div class="error-message" id="user-name-error"></div>
                </div>

                <div class="input-group">
                    <label>소속 업체명<span class="required">*</span></label>
                    <div class="input-wrapper single">
                        <input type="text" id="company-name" placeholder="최대 50자" maxlength="50" oninput="validateTextField('company-name', 50)">
                    </div>
                    <div class="error-message" id="company-name-error"></div>
                </div>

                <div class="input-group">
                    <label>직책<span class="required">*</span></label>
                    <div class="input-wrapper single">
                        <input type="text" id="position" placeholder="최대 50자" maxlength="50" oninput="validateTextField('position', 50)">
                    </div>
                    <div class="error-message" id="position-error"></div>
                </div>

                <div style="text-align: right; margin-top: 40px;">
                    <button class="btn btn-primary" id="complete-btn" onclick="completeUserRegistration()" disabled style="width: auto; min-width: 120px;">완료</button>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_script %}
    <script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
