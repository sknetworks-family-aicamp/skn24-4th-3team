{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI FastAPI Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.5;
        }

        section {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            margin-top: 8px;
            padding: 10px;
            font-size: 14px;
        }

        button {
            cursor: pointer;
        }

        pre {
            min-height: 80px;
            overflow: auto;
            padding: 12px;
            background: #f6f6f6;
            border-radius: 6px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>AI FastAPI Test</h1>

    <section>
        <h2>Chatbot</h2>
        <textarea id="chat-message" rows="4" placeholder="질문을 입력하세요">비계 작업 시 주요 안전조치는?</textarea>
        <button type="button" id="chat-button">챗봇 테스트</button>
        <pre id="chat-result"></pre>
    </section>

    <section>
        <h2>TBM Draft</h2>
        <input type="file" id="audio-file" accept="audio/*">
        <input type="text" id="lat" placeholder="lat 예: 37.5665">
        <input type="text" id="lon" placeholder="lon 예: 126.9780">
        <button type="button" id="tbm-button">TBM 테스트</button>
        <pre id="tbm-result"></pre>
    </section>

    <script>
        const csrfToken = "{{ csrf_token }}";

        document.getElementById("chat-button").addEventListener("click", async () => {
            const result = document.getElementById("chat-result");
            const message = document.getElementById("chat-message").value;
            const formData = new FormData();
            formData.append("message", message);
            formData.append("csrfmiddlewaretoken", csrfToken);

            result.textContent = "요청 중...";

            try {
                const response = await fetch("{% url 'chatbot-ask' %}", {
                    method: "POST",
                    body: formData,
                });
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = String(error);
            }
        });

        document.getElementById("tbm-button").addEventListener("click", async () => {
            const result = document.getElementById("tbm-result");
            const audioFile = document.getElementById("audio-file").files[0];

            if (!audioFile) {
                result.textContent = "음성 파일을 선택하세요.";
                return;
            }

            const formData = new FormData();
            formData.append("audio_file", audioFile);
            formData.append("lat", document.getElementById("lat").value);
            formData.append("lon", document.getElementById("lon").value);
            formData.append("csrfmiddlewaretoken", csrfToken);

            result.textContent = "요청 중...";

            try {
                const response = await fetch("{% url 'tbm-create' %}", {
                    method: "POST",
                    body: formData,
                    headers: {
                        "X-Requested-With": "XMLHttpRequest",
                    },
                });
                const data = await response.json();

                if (!response.ok || data.success === false) {
                    result.textContent = data.error || "TBM 초안 생성에 실패했습니다.";
                    return;
                }

                const payload = data.data || {};
                const references = Array.isArray(payload.references) ? payload.references : [];

                result.textContent = [
                    "[STT]",
                    payload.stt_text || "",
                    "",
                    "[회의 내용]",
                    payload.meeting_text || "",
                    "",
                    "[날씨]",
                    payload.weather_text || "",
                    "",
                    "[TBM 초안]",
                    payload.draft || "",
                    "",
                    "[참조 출처]",
                    references.length ? references.map((item) => `- ${item}`).join("\n") : "없음",
                ].join("\n");
            } catch (error) {
                result.textContent = String(error);
            }
        });
    </script>
</body>
</html>
