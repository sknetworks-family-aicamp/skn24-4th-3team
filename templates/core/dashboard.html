{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBM 현장관리 - 메인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="container">
        <!-- 사이드바 (컨테이너 내부) -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span class="logo-icon">🎩</span>
                    <span>HelpMet</span>
                </div>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>

            <div class="sidebar-menu">
                <button class="sidebar-menu-item" onclick="navigateTo('mypage.html')">
                    <span class="menu-icon">👤</span>
                    <span>마이페이지</span>
                </button>
                <button class="sidebar-menu-item" onclick="navigateTo('tbm-list.html')">
                    <span class="menu-icon">📋</span>
                    <span>TBM 목록</span>
                </button>
                <button class="sidebar-menu-item" onclick="navigateTo('chatbot.html')">
                    <span class="menu-icon">💬</span>
                    <span>챗봇</span>
                </button>
            </div>

            <div class="sidebar-footer">
                <button class="sidebar-logout" onclick="logout()">
                    <span>→</span>
                    <span>로그아웃</span>
                </button>
            </div>
        </div>

        <!-- 헤더 -->
        <div class="header main-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="header-content">
                <h1>남다람 님, 안녕하세요 !</h1>
                <p>안전한 하루의 시작, HelpMet과 함께</p>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <!-- 달력 영역 (60%) -->
            <div class="calendar-section">
                <div class="calendar-controls">
                    <select id="month-select" onchange="changeMonth()">
                        <option value="1">1월</option>
                        <option value="2">2월</option>
                        <option value="3">3월</option>
                        <option value="4">4월</option>
                        <option value="5">5월</option>
                        <option value="6">6월</option>
                        <option value="7">7월</option>
                        <option value="8">8월</option>
                        <option value="9">9월</option>
                        <option value="10">10월</option>
                        <option value="11" selected>11월</option>
                        <option value="12">12월</option>
                    </select>
                    <select id="year-select" onchange="changeYear()">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>

                <div class="calendar">
                    <div class="calendar-header">
                        <div>월</div>
                        <div>화</div>
                        <div>수</div>
                        <div>목</div>
                        <div>금</div>
                        <div>토</div>
                        <div>일</div>
                    </div>
                    <div class="calendar-body" id="calendar-body">
                        <!-- JavaScript로 생성 -->
                    </div>
                </div>
            </div>

            <!-- TBM 목록 영역 (40%) -->
            <div class="tbm-section">
                <div class="tbm-header">
                    <span class="tbm-icon">🕐</span>
                    <span id="selected-date">11월 11일 기록</span>
                </div>

                <div class="tbm-list" id="tbm-list">
                    <!-- 기록이 없을 때 -->
                    <div class="tbm-empty">
                        <div class="empty-icon">📋+</div>
                        <p>기록이 없습니다.</p>
                    </div>
                </div>

                <button class="btn btn-primary tbm-start-btn" onclick="startTBM()">TBM 시작하기</button>
            </div>
        </div>
    </div>

    <script src="{% static 'js/common.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
