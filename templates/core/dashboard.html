{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpMet - 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #1e3a5f;
            --primary-light: #2d5a8e;
            --accent: #f0a500;
            --bg: #f4f6f9;
            --white: #ffffff;
            --text: #2c3e50;
            --text-secondary: #7f8c8d;
            --border: #e0e6ed;
            --sidebar-width: 260px;
            --chatbot-width: 360px;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── 오버레이 ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }
        .overlay.active { display: block; }

        /* ── 사이드바 ── */
        .sidebar {
            position: fixed;
            top: 0;
            left: -var(--sidebar-width);
            left: -260px;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--primary);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: left 0.3s ease;
            box-shadow: var(--shadow);
        }

        .sidebar.open { left: 0; }

        .sidebar-header {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo span {
            color: var(--accent);
        }

        .sidebar-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: color 0.2s;
        }

        .sidebar-close:hover { color: var(--white); }

        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: var(--white);
        }

        .nav-item.active {
            background: rgba(255,255,255,0.15);
            color: var(--white);
        }

        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar-footer {
            padding: 20px 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            padding: 8px 0;
            transition: color 0.2s;
        }

        .logout-btn:hover { color: #e74c3c; }

        /* ── 메인 ── */
        .main {
            min-height: 100vh;
            padding: 0;
        }

        /* 상단 헤더 */
        .topbar {
            background: var(--white);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .hamburger {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hamburger:hover { background: var(--bg); }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .topbar-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
        }

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            background: var(--primary);
            color: var(--white);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        /* 컨텐츠 */
        .content {
            padding: 28px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 카드 */
        .card {
            background: var(--white);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 캘린더 */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .calendar-month {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .cal-nav {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .cal-nav:hover {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-day-header {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 8px 0;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .cal-day:hover { background: var(--bg); }
        .cal-day.today {
            background: var(--primary);
            color: var(--white);
            font-weight: 700;
        }

        .cal-day.has-record::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        .cal-day.other-month { color: #ccc; }

        /* TBM 기록 */
        .record-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .record-item:last-child { border-bottom: none; }
        .record-item:hover { padding-left: 4px; }

        .record-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .record-info { flex: 1; }

        .record-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 3px;
        }

        .record-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 10px;
        }

        .record-arrow {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        /* TBM 시작 버튼 */
        .tbm-start-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .tbm-start-btn:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(30,58,95,0.3);
        }

        /* ── 챗봇 패널 ── */
        .chatbot-panel {
            position: fixed;
            top: 0;
            right: -380px;
            width: var(--chatbot-width);
            height: 100vh;
            background: var(--white);
            z-index: 200;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 20px rgba(0,0,0,0.12);
            transition: right 0.3s ease;
        }

        .chatbot-panel.open { right: 0; }

        .chatbot-header {
            background: var(--primary);
            padding: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chatbot-title {
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chatbot-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 20px;
            padding: 4px;
            transition: color 0.2s;
        }

        .chatbot-close:hover { color: var(--white); }

        .chatbot-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.bot {
            background: var(--bg);
            color: var(--text);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }

        .message.user {
            background: var(--primary);
            color: var(--white);
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .message.loading {
            background: var(--bg);
            align-self: flex-start;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-4px); opacity: 1; }
        }

        .chatbot-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chatbot-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
        }

        .chatbot-input:focus { border-color: var(--primary); }

        .chatbot-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: var(--white);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chatbot-send:hover {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        .chatbot-send:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<!-- 오버레이 -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- 사이드바 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">⛑ Help<span>Met</span></div>
        <button class="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'mypage' %}" class="nav-item">
            <span class="nav-icon">👤</span> 마이페이지
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">📋</span> TBM 목록
        </a>
        <button class="nav-item" onclick="toggleChatbot()">
            <span class="nav-icon">💬</span> 챗봇
        </button>
    </nav>

<div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="logout-btn">
        <span>↩</span> 로그아웃
    </a>
</div>
</div>

<!-- 챗봇 패널 -->
<div class="chatbot-panel" id="chatbot-panel">
    <div class="chatbot-header">
        <div class="chatbot-title">💬 안전 규정 챗봇</div>
        <button class="chatbot-close" onclick="closeChatbot()">✕</button>
    </div>

    <div class="chatbot-messages" id="chatbot-messages">
        <div class="message bot">
            안녕하세요! 건설현장 안전 규정에 대해 궁금한 점을 질문해주세요. 😊
        </div>
    </div>

    <div class="chatbot-input-area">
        <textarea
            class="chatbot-input"
            id="chatbot-input"
            placeholder="질문을 입력하세요..."
            rows="1"
            onkeydown="handleChatKeydown(event)"
        ></textarea>
        <button class="chatbot-send" id="chatbot-send" onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- 메인 -->
<div class="main">
    <!-- 상단 바 -->
    <div class="topbar">
        <button class="hamburger" onclick="openSidebar()">
            <span></span><span></span><span></span>
        </button>
        <div class="topbar-title">대시보드</div>
        <div class="topbar-right">
            <div class="user-badge">{{ request.user.username }} 님</div>
        </div>
    </div>

    <!-- 컨텐츠 -->
    <div class="content">

        <!-- 왼쪽: 캘린더 -->
        <div>
            <div class="card">
                <div class="calendar-header">
                    <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
                    <div class="calendar-month" id="calendar-month"></div>
                    <button class="cal-nav" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <div class="cal-day-header">일</div>
                    <div class="cal-day-header">월</div>
                    <div class="cal-day-header">화</div>
                    <div class="cal-day-header">수</div>
                    <div class="cal-day-header">목</div>
                    <div class="cal-day-header">금</div>
                    <div class="cal-day-header">토</div>
                </div>
            </div>

            <!-- TBM 시작 버튼 -->
            <a href="{% url 'tbm-create' %}" class="tbm-start-btn">
                🦺 TBM 시작하기
            </a>
        </div>

        <!-- 오른쪽: TBM 기록 -->
        <div class="card">
            <div class="card-title">📋 TBM 기록</div>
            <div id="tbm-records">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div>기록이 없습니다.</div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// ── 사이드바 ──
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('overlay').classList.add('active');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

function closeAll() {
    closeSidebar();
    closeChatbot();
}

// ── 챗봇 패널 ──
function toggleChatbot() {
    const panel = document.getElementById('chatbot-panel');
    if (panel.classList.contains('open')) {
        closeChatbot();
    } else {
        closeSidebar();
        panel.classList.add('open');
        document.getElementById('overlay').classList.add('active');
        document.getElementById('chatbot-input').focus();
    }
}

function closeChatbot() {
    document.getElementById('chatbot-panel').classList.remove('open');
    document.getElementById('overlay').classList.remove('active');
}

// ── 챗봇 메시지 ──
function handleChatKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function addMessage(content, type) {
    const messages = document.getElementById('chatbot-messages');
    const div = document.createElement('div');
    div.className = `message ${type}`;

    if (type === 'loading') {
        div.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
    } else {
        div.textContent = content;
    }

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
}

async function sendMessage() {
    const input = document.getElementById('chatbot-input');
    const sendBtn = document.getElementById('chatbot-send');
    const message = input.value.trim();

    if (!message) return;

    // 사용자 메시지 표시
    addMessage(message, 'user');
    input.value = '';
    sendBtn.disabled = true;

    // 로딩 표시
    const loadingEl = addMessage('', 'loading');

    try {
        const formData = new FormData();
        formData.append('message', message);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        const res = await fetch("{% url 'chatbot-ask' %}", {
            method: 'POST',
            body: formData,
        });

        const data = await res.json();
        loadingEl.remove();

        if (data.success) {
            addMessage(data.data.answer, 'bot');
        } else {
            addMessage('오류가 발생했습니다. 다시 시도해주세요.', 'bot');
        }

    } catch (err) {
        loadingEl.remove();
        addMessage('연결에 실패했습니다. 다시 시도해주세요.', 'bot');
    }

    sendBtn.disabled = false;
    input.focus();
}

// ── 캘린더 ──
let currentYear, currentMonth;

function initCalendar() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();
}

function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
}

function renderCalendar() {
    const monthEl = document.getElementById('calendar-month');
    const gridEl = document.getElementById('calendar-grid');

    monthEl.textContent = `${currentYear}년 ${currentMonth + 1}월`;

    // 기존 날짜 제거 (헤더 7개는 유지)
    while (gridEl.children.length > 7) {
        gridEl.removeChild(gridEl.lastChild);
    }

    const today = new Date();
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevLastDate = new Date(currentYear, currentMonth, 0).getDate();

    // 이전 달
    for (let i = firstDay - 1; i >= 0; i--) {
        const div = document.createElement('div');
        div.className = 'cal-day other-month';
        div.textContent = prevLastDate - i;
        gridEl.appendChild(div);
    }

    // 이번 달
    for (let d = 1; d <= lastDate; d++) {
        const div = document.createElement('div');
        div.className = 'cal-day';
        div.textContent = d;

        if (
            d === today.getDate() &&
            currentMonth === today.getMonth() &&
            currentYear === today.getFullYear()
        ) {
            div.classList.add('today');
        }

        gridEl.appendChild(div);
    }

    // 다음 달
    const remaining = 42 - gridEl.children.length + 7;
    for (let d = 1; d <= remaining; d++) {
        const div = document.createElement('div');
        div.className = 'cal-day other-month';
        div.textContent = d;
        gridEl.appendChild(div);
    }
}

initCalendar();
</script>
</body>
</html>
