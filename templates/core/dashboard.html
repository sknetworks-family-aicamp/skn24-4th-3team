{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBM 현장관리 - 메인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="container">
        <!-- 사이드바 오버레이 -->
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- 사이드바 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <span class="logo-icon">🎩</span>
                    <span>HelpMet</span>
                </div>
                <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
            </div>
            <div class="sidebar-menu">
                <button class="sidebar-menu-item" onclick="window.location.href='/account/mypage/'">
                    <span class="menu-icon">👤</span><span>마이페이지</span>
                </button>
                <button class="sidebar-menu-item" onclick="window.location.href='/tbm/list/'">
                    <span class="menu-icon">📋</span><span>TBM 목록</span>
                </button>
                <button class="sidebar-menu-item" onclick="window.location.href='/core/chatbot/'">
                    <span class="menu-icon">💬</span><span>챗봇</span>
                </button>
            </div>
            <div class="sidebar-footer">
                <button class="sidebar-logout" onclick="logout()">
                    <span>→</span><span>로그아웃</span>
                </button>
            </div>
        </div>

        <!-- 헤더 -->
        <div class="header main-header">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="header-content">
                <h1>{{ request.user.name }} 님, 안녕하세요 !</h1>
                <p>안전한 하루의 시작, HelpMet과 함께</p>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <!-- 달력 영역 -->
            <div class="calendar-section">
                <div class="calendar-controls">
                    <select id="month-select" onchange="onMonthYearChange()">
                        {% for m in months %}
                        <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>{{ m }}월</option>
                        {% endfor %}
                    </select>
                    <select id="year-select" onchange="onMonthYearChange()">
                        {% for y in years %}
                        <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
                        {% endfor %}
                    </select>
                </div>
            
                <div class="calendar">
                    <div class="calendar-header">
                        <div>월</div><div>화</div><div>수</div><div>목</div>
                        <div>금</div><div>토</div><div>일</div>
                    </div>
                    <div class="calendar-body" id="calendar-body"></div>
                </div>
            </div>

            <!-- TBM 목록 영역 -->
            <div class="tbm-section">
                <div class="tbm-header">
                    <span class="tbm-icon">🕐</span>
                    <span id="selected-date-label">날짜를 선택하세요</span>
                </div>
                <div class="tbm-list" id="tbm-list">
                    <div class="tbm-empty">
                        <div class="empty-icon">📋+</div>
                        <p>기록이 없습니다.</p>
                    </div>
                </div>
                <button class="btn btn-primary tbm-start-btn" onclick="startTBM()">+ TBM 시작하기</button>
            </div>
        </div>
    </div>

    <script>
        const TODAY          = '{{ today }}';
        const CURRENT_MONTH  = {{ current_month }};
        const CURRENT_YEAR   = {{ current_year }};
        let   calendarTbmDates = {{ tbm_dates|safe }};
    </script>
    <script src="{% static 'js/common.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
