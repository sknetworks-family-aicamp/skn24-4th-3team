version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: helpmet-redis
    expose:
      - 6379
    restart: always

  web:
    build: .
    container_name: helpmet-web
    volumes:
      - static:/code/staticfiles
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/1
    expose:
      - 8000
    depends_on:
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: helpmet-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/code/staticfiles
    depends_on:
      - web
    restart: always

volumes:
  static:
