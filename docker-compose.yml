version: '3.9'

services:
  web:
    build: .
    container_name: helpmet-web
    volumes:
      - static:/code/staticfiles
    env_file:
      - .env
    expose:
      - 8000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: helpmet-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/code/staticfiles
    depends_on:
      - web
    restart: always

volumes:
  static:
